version: '3.8'

# Default logging configuration for all services
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
    labels: "service={{service}}"

services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_LOG_MESSAGE_FORMAT_VERSION: "3.0"
      CLUSTER_ID: dgyEUD64SCOUi2gXyMGB1w==
    ports:
      - "9092:9092"
    networks:
      - flux-network
    volumes:
      - kafka-data:/var/lib/kafka/data
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure:3

  flux-warehouse:
    build:
      context: ./flux-warehouse
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: flux-warehouse
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NETWORK_MODE: ${NETWORK_MODE:-local}
      MACHINE_FQDN: ${MACHINE_FQDN:-thinkpad.antelope-centauri.ts.net}
      FLUX_API_KEY: ${FLUX_API_KEY:-test-key-change-me}
    ports:
      - "8880:8880"
    networks:
      - flux-network
    volumes:
      - warehouse-data:/app/data
    logging: *default-logging
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8880/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: on-failure:2

  flux-gateway:
    build:
      context: ./flux-gateway
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      flux-warehouse:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: flux-gateway
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_WAREHOUSE_URL: http://flux-warehouse:8880
      NETWORK_MODE: ${NETWORK_MODE:-local}
      MACHINE_FQDN: ${MACHINE_FQDN:-thinkpad.antelope-centauri.ts.net}
      FLUX_API_KEY: ${FLUX_API_KEY:-test-key-change-me}
    ports:
      - "8881:8881"
    networks:
      - flux-network
    logging: *default-logging
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8881/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: on-failure:2

  flux-generator:
    build:
      context: ./flux-generator
      dockerfile: Dockerfile
    depends_on:
      flux-gateway:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: flux-generator
      GATEWAY_URL: http://flux-gateway:8881
      NETWORK_MODE: ${NETWORK_MODE:-local}
      MACHINE_FQDN: ${MACHINE_FQDN:-thinkpad.antelope-centauri.ts.net}
      FLUX_API_KEY: ${FLUX_API_KEY:-test-key-change-me}
    ports:
      - "8882:8882"
    networks:
      - flux-network
    logging: *default-logging
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8882/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: on-failure:2

networks:
  flux-network:
    driver: bridge

volumes:
  kafka-data:
  warehouse-data:
