spring:
  webflux:
    base-path: /api
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    topic: data-stream
  lifecycle:
    timeout-per-shutdown-phase: 30s
    
server:
  port: 8881
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  level:
    root: INFO
    com.flux.gateway: DEBUG
    org.springframework.kafka: WARN
    org.apache.kafka: WARN

app:
  network-mode: ${NETWORK_MODE:local}
  machine-fqdn: ${MACHINE_FQDN:localhost}
  api-key: ${FLUX_API_KEY:test-key-change-me}
  warehouse-url: ${WAREHOUSE_URL:http://localhost:8880}
