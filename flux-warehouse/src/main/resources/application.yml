spring:
  webflux:
    base-path: /api
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: flux-warehouse
      auto-offset-reset: earliest
      properties:
        max.poll.records: 500
    topic: data-stream
  datasource:
    url: jdbc:sqlite:data/flux-data.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8880
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  level:
    root: INFO
    com.flux.warehouse: DEBUG
    org.springframework.kafka: WARN
    org.apache.kafka: WARN

app:
  network-mode: ${NETWORK_MODE:local}
  machine-fqdn: ${MACHINE_FQDN:localhost}
  api-key: ${FLUX_API_KEY}
